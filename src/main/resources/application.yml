spring:
  application:
    name: schemascope

  datasource:
    url: ${SCHEMASCOPE_DB_URL:jdbc:postgresql://localhost:5432/schemascope}
    username: ${SCHEMASCOPE_DB_USERNAME:schemascope}
    password: ${SCHEMASCOPE_DB_PASSWORD:schemascope_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

server:
  port: ${SCHEMASCOPE_SERVER_PORT:8080}

schemascope:
  workspace:
    root-dir: ${SCHEMASCOPE_WORKSPACE_ROOT:./data/workspaces}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO